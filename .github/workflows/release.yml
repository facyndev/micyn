name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y portaudio19-dev python3-tk dpkg
        python -m venv .venv
        .venv/bin/pip install --upgrade pip
        .venv/bin/pip install -r requirements.txt
        .venv/bin/pip install jaraco.text jaraco.functools jaraco.context

    - name: Install Dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install jaraco.text jaraco.functools jaraco.context

    - name: Install Inno Setup (Windows)
      if: matrix.os == 'windows-latest'
      run: choco install innosetup --no-progress -y

    - name: Build Linux DEB Package
      if: matrix.os == 'ubuntu-latest'
      run: |
        chmod +x build_ubuntu.sh
        ./build_ubuntu.sh

    - name: Build Windows with PyInstaller
      if: matrix.os == 'windows-latest'
      shell: cmd
      run: pyinstaller --noconfirm micyn.spec

    - name: Get version (Windows)
      if: matrix.os == 'windows-latest'
      id: version
      shell: bash
      run: |
        VERSION=$(python -c "exec(open('constants.py').read()); print(APP_VERSION)")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        mkdir -p releases

    - name: Build Windows Installer with Inno Setup
      if: matrix.os == 'windows-latest'
      shell: cmd
      run: |
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.version }} micyn_installer.iss

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: micyn-${{ matrix.os }}-build
        path: releases/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download ALL artifacts
      uses: actions/download-artifact@v4
      with:
        path: releases
        merge-multiple: true

    - name: Create or Update Github Release
      uses: softprops/action-gh-release@v2
      with:
        files: releases/*
        generate_release_notes: false

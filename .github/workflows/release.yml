name: Build and Release

on:
  push:
    tags:
      - 'v*' # Dispara el workflow solo si haces push a un tag de versión, ej. v1.0.0

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y portaudio19-dev python3-tk
        # Crear arquetipo virtual para el script local
        python -m venv .venv
        .venv/bin/pip install --upgrade pip
        .venv/bin/pip install pyinstaller Pillow customtkinter sounddevice numpy

    - name: Install Dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller Pillow customtkinter sounddevice numpy

    - name: Build Linux DEB Package
      if: matrix.os == 'ubuntu-latest'
      run: |
        chmod +x build_ubuntu.sh
        ./build_ubuntu.sh

    - name: Build Windows EXE
      if: matrix.os == 'windows-latest'
      run: |
        cmd /c build_windows.bat

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: micyn-${{ matrix.os }}-build
        path: releases/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download ALL artifacts
      uses: actions/download-artifact@v4
      with:
        path: releases
        merge-multiple: true

    - name: Create or Update Github Release
      uses: softprops/action-gh-release@v2
      with:
        files: releases/*
        generate_release_notes: true

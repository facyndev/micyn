name: Build & Release Beta

on:
  push:
    branches:
      - refactor/modular-architecture
    tags:
      - 'v*-beta*'

jobs:
  build-windows:
    name: Compilar Windows (Instalador .exe)
    runs-on: windows-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt pyinstaller

      - name: Instalar Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compilar con PyInstaller
        run: pyinstaller --noconfirm micyn.spec

      - name: Obtener versión
        id: version
        shell: bash
        run: |
          VERSION=$(python -c "exec(open('constants.py').read()); print(APP_VERSION)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compilar instalador con Inno Setup
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.version }} micyn_installer.iss

      - name: Subir artefacto Windows
        uses: actions/upload-artifact@v4
        with:
          name: micyn-windows-beta
          path: releases/Micyn-Setup-*.exe

  build-linux:
    name: Compilar Linux (.deb)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias del sistema
        run: sudo apt-get install -y libportaudio2 dpkg

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt pyinstaller

      - name: Compilar .deb
        run: bash build_ubuntu.sh

      - name: Subir artefacto Linux
        uses: actions/upload-artifact@v4
        with:
          name: micyn-linux-beta
          path: releases/*.deb

  # Solo sube al release cuando se pushea un tag v*-beta*
  release:
    name: Subir binarios al release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar artefacto Windows
        uses: actions/download-artifact@v4
        with:
          name: micyn-windows-beta
          path: artifacts/

      - name: Descargar artefacto Linux
        uses: actions/download-artifact@v4
        with:
          name: micyn-linux-beta
          path: artifacts/

      - name: Subir binarios al release existente
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          fail_on_unmatched_files: false
          files: |
            artifacts/Micyn-Setup-*.exe
            artifacts/*.deb

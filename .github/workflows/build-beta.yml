name: Build & Release Beta

on:
  push:
    branches:
      - refactor/modular-architecture
    tags:
      - 'v*-beta*'

jobs:
  build-windows:
    name: Compilar Windows (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt pyinstaller

      - name: Compilar con PyInstaller
        run: pyinstaller --noconfirm micyn.spec

      - name: Comprimir release Windows
        run: Compress-Archive -Path dist/micyn/* -DestinationPath micyn-windows-beta.zip

      - name: Subir artefacto Windows
        uses: actions/upload-artifact@v4
        with:
          name: micyn-windows-beta
          path: micyn-windows-beta.zip

  build-linux:
    name: Compilar Linux (.deb)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias del sistema
        run: sudo apt-get install -y libportaudio2 dpkg

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt pyinstaller

      - name: Compilar .deb
        run: bash build_ubuntu.sh

      - name: Subir artefacto Linux
        uses: actions/upload-artifact@v4
        with:
          name: micyn-linux-beta
          path: releases/*.deb

  release:
    name: Actualizar GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar artefactos Windows
        uses: actions/download-artifact@v4
        with:
          name: micyn-windows-beta
          path: artifacts/

      - name: Descargar artefactos Linux
        uses: actions/download-artifact@v4
        with:
          name: micyn-linux-beta
          path: artifacts/

      - name: Subir binarios al release v1.3.0-beta.1
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.3.0-beta.1
          prerelease: true
          files: |
            artifacts/micyn-windows-beta.zip
            artifacts/*.deb
